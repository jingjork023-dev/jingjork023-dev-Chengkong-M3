<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz for Exam </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .quiz-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .option-btn {
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            line-height: 1.5;
        }
        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46;
        }
        .incorrect {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b;
        }
        .selected {
            background-color: #e0f2fe;
            border-color: #38bdf8;
        }
        .question-nav-btn {
            transition: all 0.2s ease-in-out;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .question-nav-btn.active {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        .question-nav-btn.answered-correct {
            background-color: #bfdbfe;
            border-color: #60a5fa;
            color: #1e40af;
        }
        .question-nav-btn.answered-incorrect {
            background-color: #fecaca;
            border-color: #f87171;
            color: #991b1b;
        }
        .question-nav-btn:hover:not(.active) {
            background-color: #f3f4f6;
        }
        .edit-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            margin-top: 4px;
        }
        .edit-label {
            font-weight: 500;
            color: #374151;
            margin-top: 12px;
            display: block;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen py-8">

    <div id="quiz-container" class="quiz-container w-full">
        
        <div class="text-center mb-8 relative">
            <h1 class="text-3xl font-bold text-gray-800">Quiz for Exam </h1>
            <p id="quiz-subtitle" class="text-gray-500 mt-2">Subject: VONG DANY</p>
            <p class="text-gray-500">Lecturer: Bacterie</p>
            <div class="absolute top-0 left-0 flex gap-2">
                <button id="practice-sheet-btn" class="bg-blue-100 text-blue-700 font-semibold py-2 px-4 rounded-lg hover:bg-blue-200 text-sm">Practice Sheet</button>
                <button id="show-all-btn" class="bg-green-100 text-green-700 font-semibold py-2 px-4 rounded-lg hover:bg-green-200 text-sm">Show Answers</button>
            </div>
            <button id="edit-quiz-btn" class="absolute top-0 right-0 bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg hover:bg-gray-300 text-sm">Edit Quiz</button>
        </div>

        <div class="text-center mb-6">
            <div class="inline-flex rounded-md shadow-sm flex-wrap justify-center" role="group">
                <button id="part1-btn" type="button" class="py-2 px-6 text-sm font-medium text-white bg-indigo-600 rounded-l-lg border border-gray-200 hover:bg-indigo-700 focus:z-10 focus:ring-2 focus:ring-indigo-500">Part 1</button>
                <button id="part2-btn" type="button" class="py-2 px-6 text-sm font-medium text-gray-900 bg-white border-t border-b border-gray-200 hover:bg-gray-100 focus:z-10 focus:ring-2 focus:ring-indigo-500">Part 2</button>
                <button id="part3-btn" type="button" class="py-2 px-6 text-sm font-medium text-gray-900 bg-white border border-gray-200 hover:bg-gray-100 focus:z-10 focus:ring-2 focus:ring-indigo-500">Part 3</button>
                <button id="part4-btn" type="button" class="py-2 px-6 text-sm font-medium text-gray-900 bg-white border-t border-b border-gray-200 hover:bg-gray-100 focus:z-10 focus:ring-2 focus:ring-indigo-500">Part 4</button>
                <button id="part5-btn" type="button" class="py-2 px-6 text-sm font-medium text-gray-900 bg-white border border-gray-200 hover:bg-gray-100 focus:z-10 focus:ring-2 focus:ring-indigo-500">Part 5</button>
                <button id="part6-btn" type="button" class="py-2 px-6 text-sm font-medium text-gray-900 bg-white border border-gray-200 hover:bg-gray-100 focus:z-10 focus:ring-2 focus:ring-indigo-500">Part 6</button>
                <button id="part7-btn" type="button" class="py-2 px-6 text-sm font-medium text-gray-900 bg-white rounded-r-md border border-gray-200 hover:bg-gray-100 focus:z-10 focus:ring-2 focus:ring-indigo-500">Part 7</button>
            </div>
        </div>

        <div id="quiz-view">
            <div class="flex justify-between items-center mb-4">
                 <div id="main-score-text" class="text-lg font-bold text-indigo-600"></div>
                 <button id="redo-part-btn" class="bg-orange-100 text-orange-700 font-semibold py-2 px-4 rounded-lg hover:bg-orange-200 text-sm">Redo Part</button>
            </div>
            <div id="question-navigation" class="flex flex-wrap justify-center gap-2 mb-6"></div>
            <div id="question-area" class="mb-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="question-number" class="text-xl font-semibold text-gray-700"></h2>
                </div>
                <div id="question-text" class="text-lg text-gray-800 leading-relaxed"></div>
            </div>
            <div id="answer-area" class="grid grid-cols-1 md-grid-cols-2 gap-4"></div>
            <div id="feedback-area" class="mt-6 text-center text-lg font-medium"></div>
            <div class="mt-6 text-center">
                <button id="redo-btn" class="hidden bg-yellow-500 text-white font-bold py-2 px-6 rounded-lg hover:bg-yellow-600 transition-colors duration-300 shadow-lg">Redo Question</button>
            </div>
            <div class="mt-4 flex justify-between items-center">
                <button id="prev-btn" class="bg-gray-500 text-white font-bold py-3 px-8 rounded-lg hover:bg-gray-600 transition-colors duration-300 shadow-lg hidden"><span>&larr; Previous</span></button>
                <button id="next-btn" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-indigo-700 transition-colors duration-300 shadow-lg hidden ml-auto"><span>Next Question</span></button>
            </div>
            <div id="results-area" class="hidden text-center">
                <div class="mb-4"><h2 class="text-4xl font-extrabold text-gray-800">Quiz Complete!</h2></div>
                <p id="results-score" class="text-2xl text-gray-600 mb-6"></p>
                <div id="summary" class="text-left mt-8 bg-gray-50 p-6 rounded-lg">
                    <div class="text-center"><h3 class="text-xl font-bold text-gray-700">Review Your Answers:</h3></div>
                </div>
                <button id="restart-btn" class="mt-8 bg-indigo-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-indigo-700 transition-colors duration-300 shadow-lg"><span>Play Again</span></button>
            </div>
        </div>

        <div id="practice-sheet-view" class="hidden"></div>
        <div id="all-questions-view" class="hidden"></div>
        <div id="edit-view" class="hidden">
            <h2 class="text-2xl font-bold text-center mb-6">Edit Quiz Questions</h2>
            <div id="edit-question-navigation" class="flex flex-wrap justify-center gap-2 mb-6"></div>
            <div id="edit-questions-container"></div>
            <div class="flex justify-between items-start mt-8">
                <button id="add-question-btn" class="bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700">Add Question</button>
                <div>
                    <button id="cancel-edit-btn" class="bg-gray-500 text-white font-bold py-2 px-6 rounded-lg hover:bg-gray-600 mr-4">Cancel</button>
                    <button id="apply-preview-btn" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700">Apply to Preview</button>
                    <button id="generate-save-code-btn" class="bg-purple-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-purple-700 ml-4">Generate Save Code</button>
                </div>
            </div>
            <div id="export-area" class="hidden mt-6 p-4 border-2 border-dashed border-purple-400 rounded-lg bg-purple-50">
                <h3 class="text-lg font-semibold text-purple-800">How to Save Your Changes Permanently</h3>
                <textarea id="export-output" readonly class="w-full h-64 p-2 border rounded-md bg-gray-100 font-mono text-sm focus:ring-2 focus:ring-indigo-500 mt-4 cursor-pointer"></textarea>
                <p id="copy-feedback" class="text-purple-700 font-medium text-sm mt-2 h-4"></p>
            </div>
        </div>
    </div>

    <script>
        // --- Question Data ---

        let quizDataPart1 = [
            { number: 1, type: 'mcq', question: { en: "Stress incontinence occurs due to:" }, options: { en: ["A. Bladder infection", "B. Increased urine production", "C. Kidney failure", "D. Increased intra-abdominal pressure."] }, answer: { en: "D. Increased intra-abdominal pressure." } },
            { number: 2, type: 'mcq', question: { en: "Ureteric colic is most commonly caused by:" }, options: { en: ["A. Kidney infection", "B. Acute obstruction by a stone.", "C. Bladder tumor", "D. Diabetes."] }, answer: { en: "B. Acute obstruction by a stone." } },
            { number: 3, type: 'mcq', question: { en: "Enuresis refers to:" }, options: { en: ["A. Painful urination", "B. Reduced urine output", "C. Blood in urine", "D. Urinary incontinence at night."] }, answer: { en: "D. Urinary incontinence at night." } },
            { number: 4, type: 'mcq', question: { en: "Hypertension is important in renal history because it:" }, options: { en: ["A. Only affects the liver", "B. May cause or result from renal disease.", "C. Never affects the kidneys", "D. Is unrelated to kidney function."] }, answer: { en: "B. May cause or result from renal disease." } },
            { number: 5, type: 'mcq', question: { en: "Alport's syndrome is commonly associated with:" }, options: { en: ["A. Hearing loss.", "B. Blindness.", "C. Heart failure", "D. Asthma"] }, answer: { en: "A. Hearing loss." } },
            { number: 6, type: 'mcq', question: { en: "Excess alcohol consumption may contribute to:" }, options: { en: ["A. Hypertensive renal damage.", "B. Kidney enlargement only.", "C. Kidney stones only", "D. Urinary obstruction"] }, answer: { en: "A. Hypertensive renal damage." } },
            { number: 7, type: 'mcq', question: { en: "Crackles heard at lung bases in renal patients usually indicate:" }, options: { en: ["A. Asthma", "B. Pneumonia", "C. Fluid overload.", "D. Tuberculosis."] }, answer: { en: "C. Fluid overload." } },
            { number: 8, type: 'mcq', question: { en: "Bilateral kidney enlargement may occur in:" }, options: { en: ["A. Renal cancer", "B. Polycystic kidney disease", "C. Liver cirrhosis", "D. Peptic ulcer"] }, answer: { en: "B. Polycystic kidney disease" } },
            { number: 9, type: 'mcq', question: { en: "Cloudy fresh urine most commonly indicates the presence of:" }, options: { en: ["A. Protein", "B. Glucose", "C. Pus cells", "D. Ketones"] }, answer: { en: "C. Pus cells" } },
            { number: 10, type: 'mcq', question: { en: "Creatinine clearance provides an estimate of:" }, options: { en: ["A. Blood glucose", "B. Liver function", "C. Glomerular filtration rate", "D. Cardiac output"] }, answer: { en: "C. Glomerular filtration rate" } }
        ];

        let quizDataPart2 = [
            { number: 1, type: 'mcq', question: { en: "Urge incontinence is associated with:" }, options: { en: ["A. Weak pelvic floor muscles", "B. Abnormal detrusor muscle function", "C. Reduced urine volume", "D. Kidney stones"] }, answer: { en: "B. Abnormal detrusor muscle function" } },
            { number: 2, type: 'mcq', question: { en: "Renal colic pain is typically:" }, options: { en: ["A. Mild and intermittent", "B. Sudden, severe and sustained", "C. Painless", "D. Only occurs at night"] }, answer: { en: "B. Sudden, severe and sustained" } },
            { number: 3, type: 'mcq', question: { en: "Which disease commonly causes diabetic nephropathy?" }, options: { en: ["A. Hypertension", "B. Diabetes mellitus", "C. Asthma", "D. Tuberculosis"] }, answer: { en: "B. Diabetes mellitus" } },
            { number: 4, type: 'mcq', question: { en: "Adult polycystic kidney disease is inherited as:" }, options: { en: ["A. Autosomal dominant", "B. Autosomal recessive", "C. X-linked recessive", "D. Sporadic"] }, answer: { en: "A. Autosomal dominant" } },
            { number: 5, type: 'mcq', question: { en: "Uremic fetor refers to:" }, options: { en: ["A. Sweet smell of breath", "B. Fishy breath odor", "C. Urine-like smell on breath", "D. Fruity smell of breath"] }, answer: { en: "C. Urine-like smell on breath" } },
            { number: 6, type: 'mcq', question: { en: "Deep rapid breathing in renal failure is called:" }, options: { en: ["A. Cheyne-Stokes respiration", "B. Kussmaul respiration", "C. Biot respiration", "D. Apneustic respiration"] }, answer: { en: "B. Kussmaul respiration" } },
            { number: 7, type: 'mcq', question: { en: "Gross bladder distension causes swelling in the:" }, options: { en: ["A. Umbilical region", "B. Right hypochondrium", "C. Suprapubic region", "D. Epigastrium"] }, answer: { en: "C. Suprapubic region" } },
            { number: 8, type: 'mcq', question: { en: "Polycystic kidneys usually have a:" }, options: { en: ["A. Smooth surface", "B. Flat surface", "C. Soft surface", "D. Nodular irregular surface"] }, answer: { en: "D. Nodular irregular surface" } },
            { number: 9, type: 'mcq', question: { en: "Specific gravity measures:" }, options: { en: ["A. Urine acidity", "B. Urine concentration", "C. Glucose level", "D. Protein level"] }, answer: { en: "B. Urine concentration" } },
            { number: 10, type: 'mcq', question: { en: "Plasma creatinine level increases when:" }, options: { en: ["A. GFR increases", "B. Blood pressure decreases", "C. GFR decreases", "D. Urine pH increases"] }, answer: { en: "C. GFR decreases" } }
        ];

        let quizDataPart3 = [
            { number: 1, type: 'fill-in', question: { en: "Polyuria: Extrarenal causes may be ____ drugs.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "E", code: "E" } },
            { number: 2, type: 'fill-in', question: { en: "Polyuria: hyperglycemia with ____ in diabetes mellitus.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "F", code: "F" } },
            { number: 3, type: 'fill-in', question: { en: "Polyuria: hyperglycemia with glycosuria in ____ causing an osmotic diuresis.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "D", code: "D" } },
            { number: 4, type: 'fill-in', question: { en: "Polyuria: hyperglycemia with glycosuria in diabetes mellitus causing an ____.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "G", code: "G" } },
            { number: 5, type: 'fill-in', question: { en: "Polyuria: lack of ____ from the pituitary gland in cranial diabetes insipidus.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "A", code: "A" } },
            { number: 6, type: 'fill-in', question: { en: "Polyuria: lack of ADH from the pituitary gland in cranial ____.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "C", code: "C" } },
            { number: 7, type: 'fill-in', question: { en: "Polyuria: failure of ____ secretion by the adrenal gland in Addison's disease.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "B", code: "B" } },
            { number: 8, type: 'fill-in', question: { en: "Polyuria: Renal causes occur when the kidney tubules fail to reabsorb water appropriately in response to ____.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "A", code: "A" } },
            { number: 9, type: 'fill-in', question: { en: "Polyuria: This impaired concentrating ability occurs in nephrogenic ____.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "C", code: "C" } },
            { number: 10, type: 'fill-in', question: { en: "Polyuria: nephrogenic diabetes insipidus is usually due to genetic mutation in the tubular ____ receptor.<br><br><span class='text-sm text-gray-500'>(A)-ADH, (B)-aldosterone, (C)-diabetes insipidus, (D)-diabetes mellitus, (E)-diuretic, (F)-glycosuria, (G)-osmotic diuresis</span>" }, answer: { en: "A", code: "A" } }
        ];

        let quizDataPart4 = [
            { number: 1, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: Low ____ intake in a high ambient temperature.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "D", code: "D" } },
            { number: 2, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: Low ____ intake.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "A", code: "A" } },
            { number: 3, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: High ____ or protein intake.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "F", code: "F" } },
            { number: 4, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: High sodium or ____ intake.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "G", code: "G" } },
            { number: 5, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: High ____, oxalate, or urate excretion.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "E", code: "E" } },
            { number: 6, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: High calcium, ____, or urate excretion.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "G", code: "G" } },
            { number: 7, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: High calcium, oxalate, or ____ excretion.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "H", code: "H" } },
            { number: 8, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: Low ____ excretion.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "C", code: "C" } },
            { number: 9, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: Hyper-____ of any cause.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "B", code: "B" } },
            { number: 10, type: 'fill-in', question: { en: "Predisposing factors for kidney stones: Ileal disease or resection leads to increased ____ absorption.<br><br><span class='text-sm text-gray-500'>(A)-calcium, (B)-calcemia, (C)-citrate, (D)-fluid, (E)-oxalate, (F)-protein, (G)-sodium, (H)-urate</span>" }, answer: { en: "E", code: "E" } }
        ];
        
        let quizDataPart5 = [];
        let quizDataPart6 = [];
        let quizDataPart7 = [];

        // --- Logic Variables ---
        let quizData;
        let currentPart = 1;
        let quizState = {};
        const correctSynth = new Tone.Synth().toDestination();
        const incorrectSynth = new Tone.Synth().toDestination();
        let audioStarted = false;
        let isAnswered = false;

        // --- DOM Cache ---
        const part1Btn = document.getElementById('part1-btn');
        const part2Btn = document.getElementById('part2-btn');
        const part3Btn = document.getElementById('part3-btn');
        const part4Btn = document.getElementById('part4-btn');
        const part5Btn = document.getElementById('part5-btn');
        const part6Btn = document.getElementById('part6-btn');
        const part7Btn = document.getElementById('part7-btn');
        const quizView = document.getElementById('quiz-view');
        const editView = document.getElementById('edit-view');
        const practiceSheetBtn = document.getElementById('practice-sheet-btn');
        const practiceSheetView = document.getElementById('practice-sheet-view');
        const showAllBtn = document.getElementById('show-all-btn');
        const allQuestionsView = document.getElementById('all-questions-view');
        const editQuizBtn = document.getElementById('edit-quiz-btn');
        const applyPreviewBtn = document.getElementById('apply-preview-btn');
        const generateSaveCodeBtn = document.getElementById('generate-save-code-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const addQuestionBtn = document.getElementById('add-question-btn');
        const editQuestionsContainer = document.getElementById('edit-questions-container');
        const editQuestionNavArea = document.getElementById('edit-question-navigation');
        const exportArea = document.getElementById('export-area');
        const exportOutput = document.getElementById('export-output');
        const copyFeedbackEl = document.getElementById('copy-feedback');
        const mainScoreTextEl = document.getElementById('main-score-text');
        const questionNavArea = document.getElementById('question-navigation');
        const questionArea = document.getElementById('question-area');
        const questionNumberEl = document.getElementById('question-number');
        const questionTextEl = document.getElementById('question-text');
        const answerArea = document.getElementById('answer-area');
        const feedbackArea = document.getElementById('feedback-area');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const redoBtn = document.getElementById('redo-btn');
        const redoPartBtn = document.getElementById('redo-part-btn');
        const resultsArea = document.getElementById('results-area');
        const resultsScoreEl = document.getElementById('results-score');
        const summaryEl = document.getElementById('summary');
        const restartBtn = document.getElementById('restart-btn');

        async function startAudio() {
            if (!audioStarted) { await Tone.start(); audioStarted = true; }
        }
        
        function switchPart(part) {
            currentPart = part;
            [part1Btn, part2Btn, part3Btn, part4Btn, part5Btn, part6Btn, part7Btn].forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-white', 'text-gray-900');
            });
            
            if (part === 1) { quizData = quizDataPart1; targetBtn = part1Btn; }
            else if (part === 2){ quizData = quizDataPart2; targetBtn = part2Btn; }
            else if (part === 3){ quizData = quizDataPart3; targetBtn = part3Btn; }
            else if (part === 4){ quizData = quizDataPart4; targetBtn = part4Btn; }
            else if (part === 5){ quizData = quizDataPart5; targetBtn = part5Btn; }
            else if (part === 6){ quizData = quizDataPart6; targetBtn = part6Btn; }
            else { quizData = quizDataPart7; targetBtn = part7Btn; }
            
            targetBtn.classList.add('bg-indigo-600', 'text-white');
            targetBtn.classList.remove('bg-white', 'text-gray-900');
            document.getElementById('quiz-subtitle').textContent = `Subject: Nephrology (${quizData.length} questions)`;
            loadQuizView();
        }

        function updateScoreText() {
            mainScoreTextEl.innerHTML = `Score: ${quizState[currentPart].score} / ${quizData.length}`;
        }

        function initializeQuiz() {
            quizState = { 1: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 2: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 3: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 4: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 5: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 6: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 7: { userAnswers: [], score: 0, currentQuestionIndex: 0 } };
            switchPart(currentPart || 1); 
        }
        
        function loadQuizView() {
            quizView.classList.remove('hidden');
            [editView, practiceSheetView, allQuestionsView, resultsArea].forEach(el => el.classList.add('hidden'));
            [questionNavArea, questionArea, answerArea].forEach(el => el.classList.remove('hidden'));
            renderQuestionButtons();
            showQuestion();
            updateScoreText();
        }

        function renderQuestionButtons() {
            questionNavArea.innerHTML = '';
            quizData.forEach((question, index) => {
                const button = document.createElement('button');
                button.textContent = question.number;
                button.classList.add('question-nav-btn', 'border-2', 'border-gray-300', 'rounded-md');
                button.addEventListener('click', () => { quizState[currentPart].currentQuestionIndex = index; showQuestion(); });
                questionNavArea.appendChild(button);
            });
        }
        
        function updateQuestionButtonStyles() {
            const buttons = Array.from(questionNavArea.children);
            buttons.forEach((button, index) => {
                button.classList.remove('active', 'answered-correct', 'answered-incorrect');
                if (quizState[currentPart].userAnswers[index]) {
                    button.classList.add(quizState[currentPart].userAnswers[index].isCorrect ? 'answered-correct' : 'answered-incorrect');
                }
            });
            const currentQuestionIndex = quizState[currentPart].currentQuestionIndex;
            if(buttons[currentQuestionIndex]) buttons[currentQuestionIndex].classList.add('active');
        }

        function showQuestion() {
            resetState();
            if (quizData.length === 0) {
                questionTextEl.innerHTML = "No questions in this part.";
                questionNumberEl.innerHTML = `Question 0/0`;
                return;
            }
            const idx = quizState[currentPart].currentQuestionIndex;
            const currentQuestion = quizData[idx];
            const userAnswers = quizState[currentPart].userAnswers;
            isAnswered = userAnswers[idx] !== undefined;

            if (isAnswered) redoBtn.classList.remove('hidden');
            questionNumberEl.innerHTML = `Question ${currentQuestion.number}/${quizData.length}`;
            questionTextEl.innerHTML = `${currentQuestion.question.en}`;
            
            if (currentQuestion.type === 'mcq') {
                answerArea.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';
                currentQuestion.options.en.forEach((opt) => {
                    const button = document.createElement('button');
                    button.innerHTML = `<span>${opt}</span>`;
                    button.className = 'option-btn w-full p-4 border-2 border-gray-300 rounded-lg text-left hover:bg-gray-100';
                    button.addEventListener('click', () => selectAnswer(button, opt, idx, answerArea, feedbackArea));
                    if(isAnswered) {
                        button.disabled = true;
                        if (opt.trim() === currentQuestion.answer.en.trim()) button.classList.add('correct');
                        if (opt.trim() === userAnswers[idx].answer.trim() && !userAnswers[idx].isCorrect) button.classList.add('incorrect');
                    }
                    answerArea.appendChild(button);
                });
            } else if (currentQuestion.type === 'fill-in') {
                answerArea.className = 'flex flex-col items-center gap-4 mt-4';
                const input = document.createElement('input');
                input.id = 'fill-in-input';
                input.className = 'w-full max-w-lg p-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500';
                input.placeholder = 'Type word or letter (A, B, C...)';
                const submitBtn = document.createElement('button');
                submitBtn.textContent = 'Submit Answer';
                submitBtn.className = 'bg-indigo-500 text-white font-bold py-2 px-6 rounded-lg hover:bg-indigo-600';
                submitBtn.addEventListener('click', () => checkFillInAnswer(input, idx, answerArea, feedbackArea));
                answerArea.appendChild(input);
                answerArea.appendChild(submitBtn);

                if (isAnswered) {
                    input.value = userAnswers[idx].answer;
                    input.disabled = submitBtn.disabled = true;
                    input.classList.add(userAnswers[idx].isCorrect ? 'correct' : 'incorrect');
                    feedbackArea.innerHTML = userAnswers[idx].isCorrect ? 'Correct!' : `Wrong! The correct answer is: ${currentQuestion.answer.en} (${currentQuestion.code})`;
                    feedbackArea.className = `mt-2 text-center text-md font-medium ${userAnswers[idx].isCorrect ? 'text-green-600' : 'text-red-600'}`;
                }
            }
            updateQuestionButtonStyles();
            updateButtonVisibility();
        }
        
        function resetState() { feedbackArea.textContent = ''; answerArea.innerHTML = ''; redoBtn.classList.add('hidden'); }

        function updateButtonVisibility() {
            const idx = quizState[currentPart].currentQuestionIndex;
            prevBtn.classList.toggle('hidden', idx === 0);
            const allDone = quizState[currentPart].userAnswers.filter(Boolean).length === quizData.length;
            nextBtn.classList.toggle('hidden', allDone);
            nextBtn.innerHTML = (idx === quizData.length - 1 || allDone) ? "Show Results" : "Next Question";
        }
        
        async function checkFillInAnswer(input, idx, container, feedbackEl) {
            await startAudio();
            if (quizState[currentPart].userAnswers[idx]) return;
            const val = input.value.trim().toUpperCase();
            const currentQuestion = quizData[idx];
            // Check if user typed the word OR the letter code
            const isCorrect = val === currentQuestion.answer.en.toUpperCase() || val === (currentQuestion.code || "").toUpperCase();

            input.disabled = true;
            container.querySelector('button').disabled = true;

            if (isCorrect) {
                quizState[currentPart].score++;
                correctSynth.triggerAttackRelease("C5", "8n");
                input.classList.add('correct');
                feedbackEl.innerHTML = `Correct!`;
                feedbackEl.className = 'mt-2 text-center text-md font-medium text-green-600';
            } else {
                incorrectSynth.triggerAttackRelease("G3", "16n", Tone.now());
                incorrectSynth.triggerAttackRelease("F#3", "8n", Tone.now() + 0.1);
                input.classList.add('incorrect');
                feedbackEl.innerHTML = `Wrong! Correct: <strong>${currentQuestion.answer.en} (${currentQuestion.code})</strong>`;
                feedbackEl.className = 'mt-2 text-center text-md font-medium text-red-600';
            }
            quizState[currentPart].userAnswers[idx] = { isCorrect, answer: input.value };
            redoBtn.classList.remove('hidden');
            updateScoreText(); updateQuestionButtonStyles(); updateButtonVisibility();
        }

        async function selectAnswer(button, opt, idx, container, feedbackEl) {
            await startAudio();
            if (quizState[currentPart].userAnswers[idx]) return;
            const allButtons = container.querySelectorAll('button');
            allButtons.forEach(btn => btn.disabled = true);
            const q = quizData[idx];
            const isCorrect = opt.trim() === q.answer.en.trim();
            if (isCorrect) {
                quizState[currentPart].score++;
                correctSynth.triggerAttackRelease("C5", "8n");
                button.classList.add('correct');
                feedbackEl.innerHTML = `Correct!`;
                feedbackEl.className = 'mt-2 text-center text-md font-medium text-green-600';
            } else {
                incorrectSynth.triggerAttackRelease("G3", "16n", Tone.now());
                incorrectSynth.triggerAttackRelease("F#3", "8n", Tone.now() + 0.1);
                button.classList.add('incorrect');
                feedbackEl.innerHTML = `Wrong! Correct: ${q.answer.en}`;
                feedbackEl.className = 'mt-2 text-center text-md font-medium text-red-600';
                allButtons.forEach(btn => { if (btn.textContent.trim() === q.answer.en.trim()) btn.classList.add('correct'); });
            }
            quizState[currentPart].userAnswers[idx] = { isCorrect, answer: opt };
            redoBtn.classList.remove('hidden');
            updateScoreText(); updateQuestionButtonStyles(); updateButtonVisibility();
        }

        function showResults() {
            [questionNavArea, questionArea, answerArea, nextBtn, prevBtn, redoBtn].forEach(el => el.classList.add('hidden'));
            resultsArea.classList.remove('hidden');
            resultsScoreEl.innerHTML = `Final score: ${quizState[currentPart].score} / ${quizData.length}`;
            summaryEl.innerHTML = '<h3 class="text-xl font-bold text-center mb-4">Review:</h3>'; 
            quizState[currentPart].userAnswers.forEach((ua, index) => {
                if (!ua) return;
                const d = quizData[index];
                const div = document.createElement('div');
                div.className = `mb-4 p-3 rounded-md ${ua.isCorrect ? 'bg-blue-100' : 'bg-red-100'}`;
                div.innerHTML = `<p class="font-semibold">${d.number}. ${d.question.en}</p>
                    <p class="text-sm">Your answer: ${ua.answer}</p>
                    ${!ua.isCorrect ? `<p class="text-sm font-bold">Correct: ${d.answer.en} ${d.code ? `(${d.code})` : ''}</p>` : ''}`;
                summaryEl.appendChild(div);
            });
        }
        
        function redoQuestion() {
            const idx = quizState[currentPart].currentQuestionIndex;
            if (quizState[currentPart].userAnswers[idx]?.isCorrect) quizState[currentPart].score--;
            quizState[currentPart].userAnswers[idx] = undefined;
            updateScoreText(); showQuestion();
        }

        function redoPart() {
            quizState[currentPart] = { userAnswers: [], score: 0, currentQuestionIndex: 0 };
            loadQuizView();
        }

        // Listeners
        [part1Btn, part2Btn, part3Btn, part4Btn, part5Btn, part6Btn, part7Btn].forEach((btn, i) => btn.addEventListener('click', () => switchPart(i+1)));
        prevBtn.addEventListener('click', () => { if (quizState[currentPart].currentQuestionIndex > 0) { quizState[currentPart].currentQuestionIndex--; showQuestion(); } });
        nextBtn.addEventListener('click', () => {
            const idx = quizState[currentPart].currentQuestionIndex;
            if (idx < quizData.length - 1) { quizState[currentPart].currentQuestionIndex++; showQuestion(); }
            else showResults();
        });
        restartBtn.addEventListener('click', initializeQuiz);
        redoBtn.addEventListener('click', redoQuestion);
        redoPartBtn.addEventListener('click', redoPart);
        
        initializeQuiz();
    </script>
</body>
</html>
